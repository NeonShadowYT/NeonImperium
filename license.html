    <link rel="stylesheet" href="style.css">

    <style>
        .license-header { text-align: center; margin-bottom: 30px; }
        .license-header h1 { font-size: 48px; color: var(--text-primary); }
        .last-update { color: var(--text-secondary); margin-top: 8px; }
        .age-warning {
            background: rgba(244, 67, 54, 0.15);
            border-left: 4px solid #f44336;
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .age-warning i { font-size: 32px; color: #f44336; }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        .license-card {
            background: var(--bg-card-gradient);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--border);
            transition: transform 0.2s, border-color 0.2s;
        }
        .license-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .license-card h2 {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--accent);
            margin-bottom: 20px;
            font-size: 24px;
        }
        .license-card ul { list-style: none; padding: 0; margin: 0; }
        .license-card li {
            margin-bottom: 12px;
            padding-left: 28px;
            position: relative;
            line-height: 1.4;
        }
        .license-card li i { position: absolute; left: 0; top: 2px; width: 20px; text-align: center; }
        .allowed li i { color: #4caf50; }
        .forbidden li i { color: #f44336; }
        .obligation li i { color: #ff9800; }
        .section-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }
        .section-card:hover { border-color: var(--accent); }
        .section-card h2 {
            color: var(--accent);
            font-size: 24px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-card p, .section-card li { color: var(--text-secondary); line-height: 1.5; }
        .section-card ul { padding-left: 20px; margin-top: 8px; }
        .support-box {
            background: var(--bg-inner-gradient);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }
        .support-box i { font-size: 40px; color: var(--accent); margin-bottom: 10px; }
        .footer-note {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 14px;
        }
        .lang-note {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 13px;
        }
    </style>
